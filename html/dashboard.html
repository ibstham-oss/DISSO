<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        :root {
            --bg: #0b1020;
            --card-bg: #141b2f;
            --accent: #4f8cff;
            --accent-soft: rgba(79, 140, 255, 0.2);
            --text-main: #f5f7ff;
            --text-muted: #9aa4c6;
            --error: #ff6b6b;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #202b4d 0, #050814 55%, #02030a 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(5, 8, 20, 0.96);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
        }
        .logo {
            font-weight: 600;
            letter-spacing: 0.05em;
            font-size: 1rem;
            text-transform: uppercase;
            color: var(--text-main);
        }
        .nav-right {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 0.9rem;
        }
        .nav-email {
            color: var(--text-muted);
        }
        .nav-email span {
            color: var(--text-main);
            font-weight: 500;
        }
        .logout-link {
            color: var(--accent);
            text-decoration: none;
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            border: 1px solid var(--accent-soft);
            background: rgba(13, 25, 48, 0.9);
        }
        .logout-link:hover {
            background: var(--accent-soft);
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem 3rem;
        }
        .card {
            width: 100%;
            max-width: 720px;
            background: radial-gradient(circle at top left, #1e2742 0, #111729 40%, #0c1220 100%);
            border-radius: 18px;
            padding: 1.75rem 1.75rem 2rem;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .card-header {
            margin-bottom: 1.5rem;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }
        .card-subtitle {
            margin: 0.3rem 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1 1 160px;
            min-width: 0;
            padding: 0.55rem 0.7rem;
            font-size: 0.95rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(5, 8, 20, 0.8);
            color: var(--text-main);
            outline: none;
        }
        input[type="text"]::placeholder {
            color: var(--text-muted);
        }
        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(79, 140, 255, 0.4);
        }
        button {
            padding: 0.55rem 1.1rem;
            font-size: 0.95rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #4f8cff, #7b5cff);
            color: #fff;
            font-weight: 500;
            white-space: nowrap;
        }
        button:hover {
            filter: brightness(1.05);
        }
        #result {
            padding: 0.75rem 0.9rem;
            border-radius: 12px;
            background: rgba(5, 8, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-height: 1.4rem;
            font-size: 0.95rem;
        }
        .loading {
            color: var(--text-muted);
        }
        .error {
            color: var(--error);
        }
        @media (max-width: 600px) {
            header {
                padding: 0.6rem 1rem;
            }
            .card {
                padding: 1.4rem 1.25rem 1.7rem;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">Rheo Ventures</div>
    <div class="nav-right">
        <div class="nav-email">Signed in as <span>{{ email }}</span></div>
        <a href="{{ url_for('logout') }}" class="logout-link">Log out</a>
    </div>
</header>

<main>
    <section class="card">
        <div class="card-header">
            <h1 class="card-title">Short‑Term Prediction</h1>
            <p class="card-subtitle">
                Enter a ticker to see the current price and a predicted price using your model backend.
            </p>
        </div>

        <form id="predict-form">
            <input type="text" id="ticker" name="ticker" placeholder="Ticker, e.g. AAPL" required>
            <button type="submit">Get prediction</button>
        </form>

        <div id="result"></div>
    </section>
</main>

<script>
    const form = document.getElementById('predict-form');
    const resultDiv = document.getElementById('result');

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        const ticker = document.getElementById('ticker').value.trim().toUpperCase();
        if (!ticker) return;

        resultDiv.textContent = 'Loading...';
        resultDiv.className = 'loading';

        fetch(`http://localhost:8000/api/predict?ticker=${ticker}`)
            .then(res => res.json())
            .then(data => {
                if (!data || data.error) {
                    resultDiv.textContent = data && data.error ? data.error : 'Error getting prediction';
                    resultDiv.className = 'error';
                    return;
                }
                resultDiv.className = '';
                resultDiv.textContent =
                    `Ticker: ${data.ticker} | Current: ${data.current_price} | Predicted: ${data.predicted_price}`;
            })
            .catch(() => {
                resultDiv.textContent = 'Error getting prediction';
                resultDiv.className = 'error';
            });
    });
</script>
</body>
</html>
